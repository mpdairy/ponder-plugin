<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Thinker silhouette - disabled state -->
  <!-- Rounded background - grey -->
  <rect width="128" height="128" rx="20" ry="20" fill="#9e9e9e"/>
  <!-- Head -->
  <circle cx="68" cy="28" r="14" fill="rgba(255,255,255,0.5)"/>
  <!-- Body - torso leaning forward -->
  <path d="
    M 58 40
    C 50 50, 42 60, 40 75
    L 38 90
    L 55 92
    L 58 78
    C 60 70, 65 62, 72 55
    L 80 48
    C 76 42, 70 40, 58 40
    Z
  " fill="rgba(255,255,255,0.5)"/>
  <!-- Thinking arm - hand to chin -->
  <path d="
    M 72 55
    C 74 52, 73 46, 68 42
    L 62 38
    C 58 42, 60 46, 62 48
    L 65 50
    C 66 52, 68 54, 72 55
    Z
  " fill="rgba(255,255,255,0.5)"/>
  <!-- Right arm resting on knee -->
  <path d="
    M 48 68
    C 44 72, 40 78, 38 85
    L 42 88
    C 44 82, 48 76, 52 72
    Z
  " fill="rgba(255,255,255,0.5)"/>
  <!-- Legs - seated position -->
  <path d="
    M 40 88
    C 36 96, 30 102, 24 108
    L 20 114
    L 32 118
    L 40 110
    C 44 104, 48 98, 50 92
    Z
  " fill="rgba(255,255,255,0.5)"/>
  <path d="
    M 50 88
    C 56 96, 64 104, 72 108
    L 80 112
    L 84 118
    L 96 114
    L 88 106
    L 76 100
    C 66 94, 58 90, 52 88
    Z
  " fill="rgba(255,255,255,0.5)"/>
  <!-- No thought bubbles - not thinking when disabled -->
</svg>
