<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Thinker silhouette - enabled state -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c6bc0"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Head -->
  <circle cx="68" cy="28" r="14" fill="white"/>
  <!-- Body - torso leaning forward -->
  <path d="
    M 58 40
    C 50 50, 42 60, 40 75
    L 38 90
    L 55 92
    L 58 78
    C 60 70, 65 62, 72 55
    L 80 48
    C 76 42, 70 40, 58 40
    Z
  " fill="white"/>
  <!-- Thinking arm - hand to chin -->
  <path d="
    M 72 55
    C 74 52, 73 46, 68 42
    L 62 38
    C 58 42, 60 46, 62 48
    L 65 50
    C 66 52, 68 54, 72 55
    Z
  " fill="white"/>
  <!-- Right arm resting on knee -->
  <path d="
    M 48 68
    C 44 72, 40 78, 38 85
    L 42 88
    C 44 82, 48 76, 52 72
    Z
  " fill="white"/>
  <!-- Legs - seated position -->
  <path d="
    M 40 88
    C 36 96, 30 102, 24 108
    L 20 114
    L 32 118
    L 40 110
    C 44 104, 48 98, 50 92
    Z
  " fill="white"/>
  <path d="
    M 50 88
    C 56 96, 64 104, 72 108
    L 80 112
    L 84 118
    L 96 114
    L 88 106
    L 76 100
    C 66 94, 58 90, 52 88
    Z
  " fill="white"/>
  <!-- Thought bubbles -->
  <circle cx="88" cy="18" r="6" fill="rgba(255,255,255,0.7)"/>
  <circle cx="98" cy="10" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="106" cy="5" r="2.5" fill="rgba(255,255,255,0.35)"/>
</svg>
